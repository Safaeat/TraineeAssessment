<div class="row justify-content-center">

  <div class="col-md-5">

    <div class="card">

      <div class="card-header bg-primary text-white">

        Login

      </div>

      <div class="card-body">

        <div class="mb-3">

          <label>Username</label>

          <input class="form-control"
                 [(ngModel)]="username">

        </div>

        <div class="mb-3">

          <label>Password</label>

          <input type="password"
                 class="form-control"
                 [(ngModel)]="password">

        </div>

        <button class="btn btn-success w-100"
                (click)="login()">

          Login

        </button>

        <br><br>

        <div class="alert alert-danger"
             *ngIf="message">

          {{message}}

        </div>

      </div>

    </div>

  </div>

</div>
